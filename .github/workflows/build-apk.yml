name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd quiz-frontend
          npm install

      - name: Build Web App
        run: |
          cd quiz-frontend
          npm run build

      - name: Sync Capacitor
        run: |
          cd quiz-frontend
          npx cap sync

      - name: Build Android APK
        run: |
          cd quiz-frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-game-apk
          path: quiz-frontend/android/app/build/outputs/apk/debug/app-debug.apk
